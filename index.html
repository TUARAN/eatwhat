<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>佳燃股份・今天吃什么</title>
  <style>
    :root {
      --bg-start: #f9fff9;
      --bg-mid: #f0fbf5;
      --bg-end: #eef8ff;
      --panel: rgba(255, 255, 255, 0.8);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --panel-soft: rgba(245, 253, 248, 0.8);
      --panel-border: rgba(166, 218, 201, 0.38);
      --text-main: #20453c;
      --text-sub: #67837b;
      --text-soft: #8ea39d;
      --accent-green: #6cc8a7;
      --accent-blue: #6cb9df;
      --accent-deep: #3e9b85;
      --accent-warm: #fff5df;
      --glow-green: rgba(170, 235, 196, 0.36);
      --glow-blue: rgba(167, 222, 255, 0.28);
      --shadow: 0 24px 70px rgba(104, 157, 144, 0.15);
      --inner-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, var(--glow-green), transparent 34%),
        radial-gradient(circle at right 12% top 18%, var(--glow-blue), transparent 28%),
        radial-gradient(circle at center bottom, rgba(227, 245, 205, 0.34), transparent 36%),
        linear-gradient(160deg, var(--bg-start), var(--bg-mid) 52%, var(--bg-end));
      display: flex;
      justify-content: center;
      padding: 0;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    .app {
      width: min(100%, 520px);
      min-height: 100vh;
      min-height: 100svh;
      padding: 16px;
      display: flex;
    }

    .panel {
      width: 100%;
      min-height: calc(100vh - 32px);
      min-height: calc(100svh - 32px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 32px;
      backdrop-filter: blur(14px);
      box-shadow: var(--inner-shadow), var(--shadow);
      padding: 18px;
      text-align: left;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .site-badge,
    .meal-badge {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(175, 223, 208, 0.42);
      color: var(--text-sub);
      white-space: nowrap;
    }

    .hero {
      position: relative;
      padding: 8px 4px 4px;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -14px;
      top: 12px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(156, 232, 195, 0.32), transparent 72%);
      pointer-events: none;
    }

    .hero-kicker {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text-sub);
    }

    .headline {
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 12vw, 70px);
      line-height: 0.94;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    .headline-main {
      display: block;
      color: var(--text-main);
    }

    .headline-accent {
      display: block;
      margin-top: 4px;
      color: var(--accent-deep);
    }

    .headline-sub {
      margin: 12px 0 0;
      font-size: 18px;
      line-height: 1.5;
      color: var(--text-sub);
      max-width: 340px;
    }

    .emphasis {
      position: relative;
      display: inline-block;
      padding: 0 6px;
    }

    .emphasis::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: 4px;
      height: 12px;
      border-radius: 999px;
      background: rgba(235, 248, 178, 0.62);
      z-index: -1;
    }

    .result {
      position: relative;
      flex: 1;
      min-height: 280px;
      border-radius: 30px;
      padding: 22px 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(240, 249, 255, 0.94)),
        linear-gradient(135deg, rgba(232, 250, 238, 0.62), rgba(233, 245, 255, 0.5));
      border: 1px solid rgba(184, 225, 213, 0.56);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
      overflow: hidden;
    }

    .result::before {
      content: "";
      position: absolute;
      right: -28px;
      bottom: -34px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(141, 205, 255, 0.2), transparent 70%);
      pointer-events: none;
    }

    .result::after {
      content: "";
      position: absolute;
      left: -28px;
      top: -28px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(189, 236, 189, 0.22), transparent 70%);
      pointer-events: none;
    }

    .result-label {
      display: inline-flex;
      align-items: center;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-deep);
      letter-spacing: 0.08em;
      background: rgba(233, 248, 241, 0.96);
    }

    .dish-name {
      margin: 0;
      font-size: clamp(34px, 10vw, 46px);
      line-height: 1.12;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    .rating {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      color: #3f7d6f;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.04em;
      box-shadow: inset 0 0 0 1px rgba(170, 215, 202, 0.28);
    }

    .hint {
      font-size: 15px;
      color: var(--text-sub);
      line-height: 1.6;
      max-width: 20em;
    }

    .action {
      width: 100%;
      border: none;
      border-radius: 24px;
      padding: 20px 20px;
      font-size: 19px;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      box-shadow: 0 16px 32px rgba(93, 184, 177, 0.28);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .action:active {
      transform: scale(0.985);
    }

    .action:hover {
      filter: brightness(1.02);
      box-shadow: 0 18px 34px rgba(89, 188, 180, 0.32);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .meta-chip {
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(184, 223, 212, 0.38);
    }

    .meta-note {
      font-size: 13px;
      color: var(--text-soft);
    }

    .footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 4px 0;
      font-size: 13px;
      color: var(--text-soft);
    }

    .company {
      letter-spacing: 0.08em;
    }

    .domain-note {
      color: var(--text-sub);
    }

    @media (max-width: 420px) {
      .app {
        padding: 10px;
      }

      .panel {
        min-height: calc(100vh - 20px);
        min-height: calc(100svh - 20px);
        padding: 14px;
        border-radius: 28px;
      }

      .topbar {
        gap: 8px;
        flex-wrap: wrap;
      }

      .site-badge,
      .meal-badge {
        min-height: 34px;
        padding: 0 12px;
      }

      .result {
        min-height: 250px;
        padding: 18px 16px;
      }

      .action {
        padding: 18px 18px;
      }

      .meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="topbar">
        <div class="site-badge">eatwhat.help · 吃什么帮选</div>
        <div class="meal-badge" id="mealTag">当前时段推荐</div>
      </div>

      <header class="hero">
        <div class="headline">
          <p class="hero-kicker">吃什么？！！帮我决定</p>
          <h1>
            <span class="headline-main">今天</span>
            <span class="headline-accent emphasis">吃什么</span>
          </h1>
        </div>
        <p class="headline-sub">家庭小清新风格的点菜页，从菜单里随机抽一道，帮你把这顿饭快速定下来。</p>
      </header>

      <div class="result" id="resultCard" aria-live="polite">
        <div class="result-label" id="resultLabel">当前推荐</div>
        <h2 class="dish-name" id="dishName">点击按钮开始抽菜</h2>
        <div class="rating" id="dishRating">等待推荐</div>
        <div class="hint" id="dishHint">轻轻一点，看看今天更适合哪一道</div>
      </div>

      <button class="action" id="pickButton" type="button">随机推荐今日菜品</button>
      <div class="meta">
        <div class="meta-chip">共 40 道候选菜品</div>
        <div class="meta-note">点一下换一道，反复抽也没问题</div>
      </div>

      <footer class="footer">
        <div class="domain-note">eatwhat.help · 吃什么？帮你决定</div>
        <div class="company">佳燃股份</div>
      </footer>
    </section>
  </main>

  <script>
    const menu = [
      { name: "吊龙炒胡萝卜", rating: "★★★★★（5 星）" },
      { name: "豆角炒蛋", rating: "★★★★★（5 星）" },
      { name: "炖排骨", rating: "★★★★☆（4 星半）" },
      { name: "炖鸡", rating: "★★★★☆（4 星半）" },
      { name: "炒五花肉", rating: "★★★★（4 星）" },
      { name: "西红柿炒鸡蛋", rating: "★★★★★（5 星）" },
      { name: "青椒土豆丝", rating: "★★★★（4 星）" },
      { name: "蒜蓉油麦菜", rating: "★★★★（4 星）" },
      { name: "韭菜炒鸡蛋", rating: "★★★★（4 星）" },
      { name: "红烧排骨", rating: "★★★★☆（4 星半）" },
      { name: "番茄土豆炖牛腩", rating: "★★★★☆（4 星半）" },
      { name: "蒜苔炒肉", rating: "★★★★（4 星）" },
      { name: "木耳炒鸡蛋", rating: "★★★★（4 星）" },
      { name: "清炒西兰花", rating: "★★★★（4 星）" },
      { name: "冬瓜排骨汤", rating: "★★★★☆（4 星半）" },
      { name: "香菇滑鸡", rating: "★★★★☆（4 星半）" },
      { name: "麻婆豆腐", rating: "★★★★（4 星）" },
      { name: "手撕包菜", rating: "★★★★（4 星）" },
      { name: "干煸豆角", rating: "★★★★（4 星）" },
      { name: "白灼菜心", rating: "★★★★（4 星）" },
      { name: "宫保鸡丁", rating: "★★★★☆（4 星半）" },
      { name: "鱼香肉丝", rating: "★★★★☆（4 星半）" },
      { name: "可乐鸡翅", rating: "★★★★★（5 星）" },
      { name: "清蒸鲈鱼", rating: "★★★★☆（4 星半）" },
      { name: "酸辣土豆丝", rating: "★★★★（4 星）" },
      { name: "丝瓜炒蛋", rating: "★★★★（4 星）" },
      { name: "芹菜香干炒肉", rating: "★★★★（4 星）" },
      { name: "豆芽炒肉丝", rating: "★★★★（4 星）" },
      { name: "萝卜炖牛腩", rating: "★★★★☆（4 星半）" },
      { name: "土豆烧肉", rating: "★★★★（4 星）" },
      { name: "蚝油生菜", rating: "★★★★（4 星）" },
      { name: "凉拌黄瓜", rating: "★★★★（4 星）" },
      { name: "蒜蓉粉丝娃娃菜", rating: "★★★★（4 星）" },
      { name: "香煎豆腐", rating: "★★★★（4 星）" },
      { name: "豆角炒肉", rating: "★★★★（4 星）" },
      { name: "莲藕炒肉", rating: "★★★★（4 星）" },
      { name: "南瓜炒肉片", rating: "★★★★（4 星）" },
      { name: "海带排骨汤", rating: "★★★★☆（4 星半）" },
      { name: "山药炒木耳", rating: "★★★★（4 星）" },
      { name: "香菇炒青菜", rating: "★★★★（4 星）" }
    ];

    const mealTag = document.getElementById("mealTag");
    const resultLabel = document.getElementById("resultLabel");
    const dishName = document.getElementById("dishName");
    const dishRating = document.getElementById("dishRating");
    const dishHint = document.getElementById("dishHint");
    const pickButton = document.getElementById("pickButton");

    let lastIndex = -1;
    let lastTapTime = 0;

    function getMealPeriod() {
      const hour = new Date().getHours();

      if (hour >= 5 && hour < 10) {
        return {
          tag: "早餐时段",
          label: "早餐推荐",
          hint: "新的一天，从认真吃饭开始"
        };
      }

      if (hour >= 10 && hour < 14) {
        return {
          tag: "午餐时段",
          label: "午餐推荐",
          hint: "中午这一顿，选个稳妥又舒服的"
        };
      }

      if (hour >= 14 && hour < 17) {
        return {
          tag: "下午时段",
          label: "下午加餐推荐",
          hint: "下午也可以先想好晚点吃什么"
        };
      }

      if (hour >= 17 && hour < 21) {
        return {
          tag: "晚餐时段",
          label: "晚餐推荐",
          hint: "忙完一天，晚饭值得认真挑一挑"
        };
      }

      return {
        tag: "夜间时段",
        label: "夜宵灵感",
        hint: "现在时间不早了，也可以先收藏这道菜"
      };
    }

    function syncMealPeriod() {
      const period = getMealPeriod();
      mealTag.textContent = period.tag;
      resultLabel.textContent = period.label;

      if (lastIndex === -1) {
        dishHint.textContent = period.hint;
      }
    }

    function pickDish() {
      let index = Math.floor(Math.random() * menu.length);

      if (menu.length > 1) {
        while (index === lastIndex) {
          index = Math.floor(Math.random() * menu.length);
        }
      }

      lastIndex = index;
      const selected = menu[index];
      const period = getMealPeriod();

      dishName.textContent = selected.name;
      dishRating.textContent = selected.rating;
      dishHint.textContent = period.hint;
    }

    document.addEventListener("dblclick", (event) => {
      event.preventDefault();
    }, { passive: false });

    document.addEventListener("touchend", (event) => {
      const now = Date.now();

      if (now - lastTapTime < 320) {
        event.preventDefault();
      }

      lastTapTime = now;
    }, { passive: false });

    syncMealPeriod();
    pickButton.addEventListener("click", pickDish);
  </script>
</body>
</html>
