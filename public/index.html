<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>吃什么？！！帮我决定</title>
  <style>
    :root {
      --bg-1: #fbfff8;
      --bg-2: #f3fbf4;
      --bg-3: #eef8ff;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(169, 215, 196, 0.34);
      --text-main: #1f433b;
      --text-sub: #6f8d84;
      --text-soft: #91a6a0;
      --green: #6fc3a3;
      --blue: #77b9e4;
      --green-deep: #42957f;
      --tag: #edf8f1;
      --shadow: 0 24px 60px rgba(98, 150, 137, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at left top, rgba(181, 236, 191, 0.34), transparent 32%),
        radial-gradient(circle at right 18% top 22%, rgba(171, 222, 255, 0.24), transparent 24%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    .shell {
      width: min(100%, 560px);
      min-height: 100vh;
      min-height: 100svh;
      margin: 0 auto;
      padding: 14px;
    }

    .slides {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 100%;
      gap: 14px;
      min-height: calc(100vh - 28px);
      min-height: calc(100svh - 28px);
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      touch-action: pan-x;
    }

    .slides::-webkit-scrollbar {
      display: none;
    }

    .page {
      scroll-snap-align: start;
      min-height: calc(100vh - 28px);
      min-height: calc(100svh - 28px);
      border-radius: 32px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid rgba(177, 220, 203, 0.36);
      background: rgba(255, 255, 255, 0.62);
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .chip.primary-chip {
      min-height: 42px;
      padding: 0 16px;
      font-size: 14px;
      color: var(--green-deep);
      background: rgba(255, 255, 255, 0.76);
    }

    .hero {
      padding: 6px 2px 0;
    }

    .eyebrow {
      margin: 0;
      font-size: clamp(52px, 16vw, 88px);
      line-height: 0.9;
      letter-spacing: -0.05em;
      font-weight: 700;
      color: var(--green-deep);
      text-wrap: balance;
    }

    .hero-title {
      position: relative;
      display: inline-block;
      padding: 0 10px 6px 4px;
    }

    .hero-title::after {
      content: "";
      position: absolute;
      left: 2px;
      right: 8px;
      bottom: 10px;
      height: 18px;
      border-radius: 999px 999px 12px 12px;
      background: linear-gradient(90deg, rgba(248, 238, 176, 0.82), rgba(198, 241, 207, 0.72));
      z-index: -1;
    }

    .subtext {
      margin: 18px 0 0;
      max-width: 13em;
      color: var(--text-sub);
      font-size: 16px;
      line-height: 1.7;
    }

    .result {
      margin-top: auto;
      margin-bottom: auto;
      padding: 22px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(241, 250, 255, 0.92)),
        linear-gradient(135deg, rgba(233, 250, 239, 0.54), rgba(235, 245, 255, 0.4));
      border: 1px solid rgba(182, 223, 208, 0.48);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
      min-height: 320px;
    }

    .result-label {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--tag);
      color: var(--green-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .dish-name {
      margin: 0;
      font-size: clamp(34px, 10vw, 48px);
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 700;
      text-wrap: balance;
    }

    .rating {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--green-deep);
      font-size: 17px;
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(178, 218, 203, 0.34);
    }

    .recipe {
      min-height: 50px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .recipe strong {
      color: var(--text-main);
    }

    .hint {
      color: var(--text-sub);
      font-size: 15px;
      line-height: 1.7;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .action {
      width: 100%;
      min-height: 60px;
      border: none;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      color: #fff;
      font-size: 19px;
      font-weight: 700;
      box-shadow: 0 16px 30px rgba(95, 179, 170, 0.24);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .action:active {
      transform: scale(0.985);
    }

    .page-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .dots {
      display: inline-flex;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(145, 166, 160, 0.28);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .dot.is-active {
      background: var(--green-deep);
      transform: scale(1.15);
    }

    .footer {
      margin-top: 18px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .baby-title {
      margin: 0;
      font-size: clamp(34px, 10vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .baby-title span {
      color: var(--green-deep);
    }

    .baby-subtext {
      margin: 14px 0 0;
      max-width: 16em;
      color: var(--text-sub);
      font-size: 16px;
      line-height: 1.7;
    }

    .baby-grid {
      margin-top: auto;
      margin-bottom: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .baby-card {
      padding: 16px 14px;
      border-radius: 22px;
      background: var(--panel-strong);
      border: 1px solid rgba(184, 223, 208, 0.42);
    }

    .baby-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      color: var(--text-main);
    }

    .baby-card p {
      margin: 0;
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .baby-note {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255, 250, 241, 0.92);
      color: #7c8375;
      font-size: 14px;
      line-height: 1.7;
      border: 1px solid rgba(232, 223, 191, 0.5);
    }

    @media (max-width: 420px) {
      .shell {
        padding: 10px;
      }

      .slides,
      .page {
        min-height: calc(100vh - 20px);
        min-height: calc(100svh - 20px);
      }

      .page {
        padding: 14px;
        border-radius: 28px;
      }

      .topbar {
        margin-bottom: 22px;
        flex-wrap: wrap;
      }

      .result {
        min-height: 296px;
        padding: 18px;
      }

      .baby-grid {
        grid-template-columns: 1fr;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="slides" id="slides">
      <section class="page">
        <div class="topbar">
          <div class="chip primary-chip">eatwhat.help</div>
          <div class="chip" id="mealTag">当前时段</div>
        </div>

        <header class="hero">
          <h1 class="hero-title">吃什么？！帮我决定</h1>
          <p class="subtext">往左滑，还有“小茉莉吃什么”。</p>
        </header>

        <div class="result" aria-live="polite">
          <div class="result-label" id="resultLabel">当前推荐</div>
          <h2 class="dish-name" id="dishName">点一下开始抽菜</h2>
          <div class="rating" id="dishRating">等待推荐</div>
          <div class="recipe" id="dishRecipe"><strong>小教程：</strong>加载菜单中…</div>
          <div class="hint" id="dishHint">想换一道，就再点一次。</div>
        </div>

        <div class="actions">
          <button class="action" id="pickButton" type="button">帮我决定吃什么</button>
          <div class="page-nav">
            <span>左右滑动切换页面</span>
            <div class="dots" aria-hidden="true">
              <span class="dot is-active"></span>
              <span class="dot"></span>
            </div>
          </div>
        </div>

        <footer class="footer">
          <span id="adultCount">菜单加载中</span>
          <span>佳燃股份</span>
        </footer>
      </section>

      <section class="page">
        <div class="topbar">
          <div class="chip">eatwhat.help · 小茉莉吃什么</div>
          <div class="chip">1 岁宝宝</div>
        </div>

        <header class="hero">
          <h2 class="baby-title">小茉莉 <span>吃什么</span></h2>
          <p class="baby-subtext">适合 1 岁宝宝的日常吃饭建议，先从软、碎、清淡开始。</p>
        </header>

        <div class="baby-grid" id="babyGrid"></div>

        <div class="baby-note">尽量少盐少糖，注意大小和软硬度，避免整颗坚果、整粒葡萄这类容易噎住的食物。</div>

        <div class="page-nav" style="margin-top: 18px;">
          <span>往右滑，回到主页</span>
          <div class="dots" aria-hidden="true">
            <span class="dot"></span>
            <span class="dot is-active"></span>
          </div>
        </div>

        <footer class="footer">
          <span id="babyCount">宝宝菜单加载中</span>
          <span>佳燃股份</span>
        </footer>
      </section>
    </div>
  </main>

  <script>
    const slides = document.getElementById("slides");
    const dots = document.querySelectorAll(".page-nav .dot");
    const mealTag = document.getElementById("mealTag");
    const resultLabel = document.getElementById("resultLabel");
    const dishName = document.getElementById("dishName");
    const dishRating = document.getElementById("dishRating");
    const dishRecipe = document.getElementById("dishRecipe");
    const dishHint = document.getElementById("dishHint");
    const pickButton = document.getElementById("pickButton");
    const adultCount = document.getElementById("adultCount");
    const babyGrid = document.getElementById("babyGrid");
    const babyCount = document.getElementById("babyCount");

    let adultMenu = [];
    let babyMenu = [];
    let lastIndex = -1;
    let lastTapTime = 0;

    function getMealPeriod() {
      const hour = new Date().getHours();

      if (hour >= 5 && hour < 10) {
        return { tag: "早餐时段", label: "早餐推荐", hint: "新的一天，从吃好第一顿开始。" };
      }

      if (hour >= 10 && hour < 14) {
        return { tag: "午餐时段", label: "午餐推荐", hint: "中午这一顿，选个稳妥的。" };
      }

      if (hour >= 14 && hour < 17) {
        return { tag: "下午时段", label: "下午加餐", hint: "先看看，晚点吃什么也能心里有数。" };
      }

      if (hour >= 17 && hour < 21) {
        return { tag: "晚餐时段", label: "晚餐推荐", hint: "忙完一天，晚饭可以认真一点。" };
      }

      return { tag: "夜间时段", label: "夜宵灵感", hint: "现在不一定马上吃，也可以先记住这道。" };
    }

    function syncMealPeriod() {
      const period = getMealPeriod();
      mealTag.textContent = period.tag;
      resultLabel.textContent = period.label;

      if (lastIndex === -1) {
        dishHint.textContent = period.hint;
      }
    }

    function pickDish() {
      if (adultMenu.length === 0) {
        return;
      }

      let index = Math.floor(Math.random() * adultMenu.length);

      if (adultMenu.length > 1) {
        while (index === lastIndex) {
          index = Math.floor(Math.random() * adultMenu.length);
        }
      }

      lastIndex = index;
      const selected = adultMenu[index];
      const period = getMealPeriod();

      dishName.textContent = selected.name_zh;
      dishRating.textContent = selected.rating_label;
      dishRecipe.innerHTML = "<strong>小教程：</strong>" + selected.short_recipe;
      dishHint.textContent = period.hint;
    }

    function renderBabyMenu() {
      if (babyMenu.length === 0) {
        babyGrid.innerHTML = "<article class=\"baby-card\"><h3>暂时没有数据</h3><p>等菜单入库后，这里会自动显示。</p></article>";
        babyCount.textContent = "宝宝菜单暂时为空";
        return;
      }

      babyGrid.innerHTML = babyMenu.map((dish) => `
        <article class="baby-card">
          <h3>${dish.name_zh}</h3>
          <p>${dish.short_recipe}</p>
        </article>
      `).join("");

      babyCount.textContent = `宝宝菜单 ${babyMenu.length} 条`;
    }

    function syncDots() {
      const pageIndex = Math.round(slides.scrollLeft / slides.clientWidth);
      dots.forEach((dot, index) => {
        dot.classList.toggle("is-active", index === pageIndex);
      });
    }

    async function loadMenu() {
      try {
        const [adultResponse, babyResponse] = await Promise.all([
          fetch("/api/dishes?audience=adult"),
          fetch("/api/dishes?audience=baby")
        ]);

        if (!adultResponse.ok || !babyResponse.ok) {
          throw new Error("menu request failed");
        }

        const adultData = await adultResponse.json();
        const babyData = await babyResponse.json();

        adultMenu = adultData.dishes || [];
        babyMenu = babyData.dishes || [];

        adultCount.textContent = `共 ${adultMenu.length} 道菜`;
        dishRecipe.innerHTML = "<strong>小教程：</strong>菜单就绪，点一下开始抽菜。";

        renderBabyMenu();
      } catch (error) {
        adultCount.textContent = "暂时无法读取菜单";
        dishRecipe.innerHTML = "<strong>小教程：</strong>接口暂时不可用，请稍后再试。";
        renderBabyMenu();
      }
    }

    document.addEventListener("dblclick", (event) => {
      event.preventDefault();
    }, { passive: false });

    document.addEventListener("touchend", (event) => {
      const now = Date.now();

      if (now - lastTapTime < 320) {
        event.preventDefault();
      }

      lastTapTime = now;
    }, { passive: false });

    slides.addEventListener("scroll", syncDots, { passive: true });
    pickButton.addEventListener("click", pickDish);

    syncMealPeriod();
    syncDots();
    loadMenu();
  </script>
</body>
</html>
